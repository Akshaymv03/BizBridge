services:
  # Backend Web Service
  - type: web
    name: bizbridge-api
    env: docker
    dockerfilePath: ./backend/Dockerfile
    region: frankfurt # Choose region closest to you
    plan: free
    healthCheckPath: /api/schema/
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bizbridge-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "True"

  # PostgreSQL Database
  - type: pgo
    name: bizbridge-db
    plan: free
    region: frankfurt
